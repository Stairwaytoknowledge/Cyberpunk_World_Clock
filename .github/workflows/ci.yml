name: CI

# Runs on every push to main and every PR. Proves the app still
# starts, paints, and passes the test suite on a real Windows runner
# before any release is cut.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest psutil

      - name: Run pytest (headless Qt via QT_QPA_PLATFORM=offscreen)
        env:
          # conftest.py also sets this, but setting it in env guarantees
          # it's active before Python imports anything Qt-related.
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v

  build-bundle:
    # Build the release bundle on every push/PR too, so we catch
    # bundle-time regressions (like the missing-icon bug we had) the
    # moment they land, not only at tag time.
    needs: test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build self-contained bundle
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File build/build_bundle.ps1 -Version v0.0.0-ci

      - name: Verify the bundle has everything an installer needs
        shell: pwsh
        run: |
          $stage = "dist/CyberpunkClock-v0.0.0-ci"
          foreach ($need in @(
              "$stage/Install.bat",
              "$stage/Launch.vbs",
              "$stage/Uninstall.bat",
              "$stage/main_qt.py",
              "$stage/src/clock_widget_qt.py",
              "$stage/assets/icon.ico",
              "$stage/assets/cities.json",
              "$stage/assets/fonts/Orbitron-VariableFont_wght.ttf",
              "$stage/runtime/pythonw.exe")) {
              if (-not (Test-Path $need)) { throw "MISSING: $need" }
          }
          Write-Host "All required bundle files present."

      - name: Smoke-launch the bundled pythonw against the widget
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          & "dist/CyberpunkClock-v0.0.0-ci/runtime/python.exe" - <<'PY'
          import os, sys
          os.chdir("dist/CyberpunkClock-v0.0.0-ci")
          sys.path.insert(0, ".")
          from PyQt6.QtCore import QTimer, qInstallMessageHandler, QtMsgType
          from PyQt6.QtWidgets import QApplication
          fatal = []
          qInstallMessageHandler(lambda m,c,t: fatal.append(t) if m == QtMsgType.QtFatalMsg else None)
          from src.clock_widget_qt import ClockWidgetQt
          app = QApplication(sys.argv)
          w = ClockWidgetQt(); w.show(); w.lower()
          QTimer.singleShot(2000, app.quit)
          rc = app.exec()
          print("rc=", rc, "fatal=", fatal)
          sys.exit(1 if fatal else rc)
          PY

      - name: Upload bundle artifact (for manual download + testing)
        uses: actions/upload-artifact@v4
        with:
          name: CyberpunkClock-ci-${{ github.sha }}
          path: dist/CyberpunkClock-v0.0.0-ci/
          retention-days: 7
