name: Release

# When you push a tag like "v1.0.0", this workflow:
#   * smoke-tests the app (constructs widget, paints for 3s, exits cleanly)
#   * builds the self-contained bundle (embeddable Python + PyQt6 + tzdata)
#   * publishes a single zip as a GitHub Release asset
#
# Users download that zip, extract, double-click Install.bat. No Python
# install, no internet needed at install time.
#
# Usage:
#     git tag v1.0.0
#     git push origin v1.0.0

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for the smoke test only)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install runtime deps for smoke test
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install Pillow

      - name: Generate icon
        run: python build/generate_icons.py

      - name: Smoke-test (construct widget, paint for 3s, exit cleanly)
        shell: pwsh
        run: |
          $env:PYTHONUNBUFFERED = "1"
          python - <<'PY'
          import os, sys
          from PyQt6.QtCore import QTimer, qInstallMessageHandler, QtMsgType
          from PyQt6.QtWidgets import QApplication
          fatal = []
          def msg(mode, ctx, m):
              if mode == QtMsgType.QtFatalMsg:
                  fatal.append(m)
                  print("QT FATAL:", m, flush=True)
          qInstallMessageHandler(msg)
          from src.clock_widget_qt import ClockWidgetQt
          app = QApplication(sys.argv)
          w = ClockWidgetQt(); w.show(); w.lower()
          QTimer.singleShot(3000, app.quit)
          rc = app.exec()
          print(f"exec rc={rc}, fatal={len(fatal)}")
          sys.exit(1 if fatal else rc)
          PY

      - name: Build self-contained bundle
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File build/build_bundle.ps1 -Version ${{ github.ref_name }}

      - name: Zip the bundle
        shell: pwsh
        run: |
          $folder = "dist/WorldClock-${{ github.ref_name }}"
          $zip    = "dist/WorldClock-${{ github.ref_name }}.zip"
          Compress-Archive -Path "$folder/*" -DestinationPath $zip -CompressionLevel Optimal
          $size = [math]::Round((Get-Item $zip).Length / 1MB, 1)
          Write-Host "Built $zip ($size MB)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: World Clock ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Install
            1. Download **`WorldClock-${{ github.ref_name }}.zip`** below.
            2. Right-click → **Extract All...**
            3. Open the extracted folder and double-click **`Install.bat`**.

            That's it. No Python install, no SmartScreen warning, no internet needed during install.

            To remove: run **`Uninstall.bat`** in the same folder, then delete the folder.
          files: dist/WorldClock-${{ github.ref_name }}.zip
