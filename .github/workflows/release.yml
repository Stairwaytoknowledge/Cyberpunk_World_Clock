name: Release

# Triggered when you push a version tag like "v1.0.0".
#
# What it does:
#   1. Runs the pytest suite on a Windows runner.
#   2. Builds the self-contained release bundle.
#   3. Zips it and attaches the zip to a new GitHub Release.
#
# The on-every-push CI workflow (ci.yml) runs the same tests plus a
# full bundle-build + smoke launch, so by the time you tag a release
# the code has already been validated end-to-end.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v

      - name: Build self-contained bundle
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File build/build_bundle.ps1 -Version ${{ github.ref_name }}

      - name: Zip the bundle
        shell: pwsh
        run: |
          $folder = "dist/WorldClock-${{ github.ref_name }}"
          $zip    = "dist/WorldClock-${{ github.ref_name }}.zip"
          Compress-Archive -Path "$folder/*" -DestinationPath $zip -CompressionLevel Optimal
          $size = [math]::Round((Get-Item $zip).Length / 1MB, 1)
          Write-Host "Built $zip ($size MB)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: World Clock ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Install
            1. Download **`WorldClock-${{ github.ref_name }}.zip`** below.
            2. Right-click → **Extract All...**
            3. Open the extracted folder and double-click **`Install.bat`**.

            No Python install, no SmartScreen warning, no internet needed during install.

            To remove: run **`Uninstall.bat`** in the same folder, then delete the folder.
          files: dist/WorldClock-${{ github.ref_name }}.zip
